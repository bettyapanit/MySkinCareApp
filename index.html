<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b5ea7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="שגרת טיפוח">
<title>שגרת טיפוח | גלית 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* Morning palette – mauves & lavenders */
  --m1:#7b5ea7; --m2:#b09cc8; --m3:#e8e0f5; --m4:#f5f1fc; --m5:#d4c8ef;
  /* Evening palette – teals & aquas */
  --e1:#3d8c8c; --e2:#72b8b8; --e3:#c8e8e8; --e4:#f0fafa; --e5:#a8d8d8;
  /* Neutrals */
  --cream:#fdf8f5; --warm:#fffcfa;
  --txt:#2e2838; --txt-m:#6a5c78; --txt-l:#a898b8;
  --gold:#c9a96e;
  --sage:#8aaa8c; --sage-l:#d4e6d5; --sage-p:#f0f7f0;
  --new:#a06800; --new-l:#fff3cd;
  --border:rgba(123,94,167,0.15);
  --shadow:0 4px 24px rgba(46,40,56,0.09);
  --r:18px; --r-s:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--txt);min-height:100vh;direction:rtl}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 15% 15%,rgba(208,200,239,.22) 0%,transparent 50%),
  radial-gradient(ellipse at 85% 80%,rgba(168,216,216,.18) 0%,transparent 50%),
  radial-gradient(ellipse at 55% 5%,rgba(208,200,239,.1) 0%,transparent 40%);
  pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:16px 14px 80px}

/* HEADER */
.hdr{text-align:center;padding:28px 0 20px}
.hdr-title{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--m1);letter-spacing:.02em}
.hdr-sub{font-size:.75rem;color:var(--txt-l);margin-top:5px;letter-spacing:.07em;text-transform:uppercase}
.hdr-line{width:50px;height:2px;background:linear-gradient(90deg,transparent,var(--m1),var(--e1),transparent);margin:10px auto 0}

/* SETUP */
.setup{background:#fff;border-radius:var(--r);padding:8px 12px;margin-bottom:12px;box-shadow:var(--shadow);display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:6px}
.setup input[type=date]{border:1.5px solid var(--border);border-radius:var(--r-s);padding:4px 6px;font-family:'DM Sans',sans-serif;font-size:.73rem;color:var(--txt);background:var(--m4);outline:none;direction:ltr;min-width:0}
.setup input[type=date]:focus{border-color:var(--m1)}
.status-badge{background:linear-gradient(135deg,var(--m3),var(--e3));border-radius:50px;padding:4px 10px;font-size:.72rem;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;text-align:center}
.btn-sm{background:none;border:1.5px solid var(--border);border-radius:var(--r-s);padding:4px 8px;font-size:.75rem;color:var(--txt-l);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-sm:hover{border-color:var(--m1);color:var(--m1)}

/* TABS */
.tabs{display:flex;background:#fff;border-radius:50px;padding:4px;margin:0 auto 20px;max-width:420px;box-shadow:var(--shadow);gap:2px}
.tab{flex:1;padding:9px 12px;border:none;background:transparent;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:var(--txt-l);cursor:pointer;transition:all .22s}
.tab.active{background:var(--m1);color:#fff;box-shadow:0 2px 10px rgba(123,94,167,.4)}

/* PROGRESS */
.prog-card{background:#fff;border-radius:var(--r);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.prog-title{font-size:.8rem;color:var(--txt-m);font-weight:500}
.prog-pct{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--m1)}
.prog-bars{display:flex;flex-direction:column;gap:9px}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-lbl{font-size:.72rem;color:var(--txt-l);width:58px;text-align:right;flex-shrink:0}
.prog-bg{flex:1;height:7px;background:var(--m3);border-radius:50px;overflow:hidden}
.prog-fill{height:100%;border-radius:50px;transition:width .6s ease}
.prog-fill.m{background:linear-gradient(90deg,var(--m3),var(--m1))}
.prog-fill.s{background:linear-gradient(90deg,var(--e3),var(--e1))}
.prog-num{font-size:.7rem;color:var(--txt-l);width:40px;text-align:left}

/* PHASE BANNER */
.phase-banner{background:linear-gradient(135deg,var(--m3) 0%,var(--e3) 100%);border-radius:var(--r);padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.phase-name{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--txt)}
.phase-desc{font-size:.75rem;color:var(--txt-m);margin-top:2px}
.phase-weeks-badge{font-size:.72rem;color:var(--txt-l);background:#fff;border-radius:50px;padding:4px 10px;white-space:nowrap}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.week-nav-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--txt)}
.nav-btn{background:#fff;border:1.5px solid var(--border);border-radius:50px;padding:6px 14px;font-size:.75rem;color:var(--txt-m);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.nav-btn:hover{background:var(--m4);border-color:var(--m1);color:var(--m1)}
.nav-btn:disabled{opacity:.3;cursor:default;pointer-events:none}

/* WEEK GRID */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-bottom:22px}
.day-cell{background:#fff;border-radius:var(--r-s);padding:9px 5px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s;box-shadow:0 2px 8px rgba(46,40,56,.05);position:relative;min-height:92px;display:flex;flex-direction:column;align-items:center;gap:3px}
.day-cell:hover{border-color:var(--m3);transform:translateY(-1px);box-shadow:var(--shadow)}
.day-cell.sel{border-color:var(--m1);background:var(--m4)}
.day-cell.today{border-color:var(--e1) !important;background:var(--e4) !important}
.day-cell.today::after{content:'';position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--m1);border-radius:50%}
.day-cell.changed .dcell-name,.day-cell.changed .dcell-type{color:var(--new)}
.day-cell.changed{border-color:var(--new-l)}
.day-cell.done{background:var(--sage-p)}
.dcell-name{font-size:.63rem;color:var(--txt-l);text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.dcell-date{font-size:.62rem;color:var(--txt-l)}
.dcell-type{font-size:.57rem;font-weight:500;line-height:1.2;text-align:center;flex:1;display:flex;align-items:center;justify-content:center;padding:0 2px;color:var(--m1)}
.dcell-badges{display:flex;flex-wrap:wrap;gap:2px;justify-content:center}
.mbadge{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:700}
.mbadge.ret{background:var(--m3);color:var(--m1)}
.mbadge.med{background:var(--e3);color:var(--e1)}
.mbadge.ac{background:#f2ead8;color:#b8a67e}
.mbadge.new-wk{background:var(--new-l);color:var(--new)}
.dcell-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:transparent;margin-top:auto;transition:all .2s;flex-shrink:0}
.day-cell.done .dcell-chk{background:var(--sage);border-color:var(--sage);color:#fff}

/* BACK BTN */
.back-btn{background:none;border:none;color:var(--m1);font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;padding:0;margin-bottom:14px}

/* DAY HEADER */
.day-hdr{border-radius:var(--r);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);background:#fff}
.day-hdr-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px}
.day-hdr-title{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--txt)}
.day-hdr-sub{font-size:.75rem;color:var(--txt-l);margin-top:2px}
.day-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.dtag{border-radius:50px;padding:4px 11px;font-size:.72rem;font-weight:500;white-space:nowrap}
.dtag.m{background:var(--m3);color:var(--m1)}
.dtag.e{background:var(--e3);color:var(--e1)}
.dtag.new-t{background:var(--new-l);color:var(--new)}

/* DAY TABS */
.day-tabs{display:flex;background:#fff;border-radius:50px;padding:4px;margin-bottom:16px;box-shadow:var(--shadow);gap:2px}
.day-tab{flex:1;padding:10px 12px;border:none;background:transparent;border-radius:14px;
  font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:500;color:var(--txt-l);
  cursor:pointer;transition:all .22s;text-align:right}
.day-tab.m-active{background:var(--m1);color:#fff;box-shadow:0 2px 10px rgba(123,94,167,.4)}
.day-tab.e-active{background:var(--e1);color:#fff;box-shadow:0 2px 10px rgba(61,140,140,.4)}
.day-tab-inner{display:flex;flex-direction:column;gap:2px}
.day-tab-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.day-tab-pct{font-size:.7rem;opacity:.85;font-weight:400}
.day-tab-sub{font-size:.7rem;opacity:.75;font-weight:400;margin-top:1px}
.day-tab-dur{font-size:.67rem;opacity:.7;font-weight:400}
.day-tabs{display:flex;background:#fff;border-radius:18px;padding:5px;margin-bottom:10px;box-shadow:var(--shadow);gap:4px}

/* SESSION – MORNING (mauve) */
.sess{border-radius:var(--r);margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;background:#fff}
.sess-body{padding:0 16px 14px;display:none}
.sess-body.open{display:block}

/* SESSION STRIPE (subtle bg for steps area) */
.sess-body.morn-body{background:var(--m4)}
.sess-body.eve-body{background:var(--e4)}

/* STEP */
.step{border-radius:var(--r-s);padding:11px 13px;margin-bottom:7px;border:1.5px solid transparent;transition:all .2s;background:#fff}
.step.done-step{opacity:.7}
.step.new-prod{border-color:var(--new-l);background:#fffdf5}
/* Morning tint */
.morn-body .step{border-color:var(--m3)}
.morn-body .step.done-step{background:var(--sage-p);border-color:var(--sage-l)}
/* Evening tint */
.eve-body .step{border-color:var(--e3)}
.eve-body .step.done-step{background:var(--sage-p);border-color:var(--sage-l)}
.step-top{display:flex;align-items:flex-start;gap:10px}
.step-num{width:24px;height:24px;border-radius:50%;font-size:.68rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.morn-body .step-num{background:var(--m3);color:var(--m1)}
.eve-body .step-num{background:var(--e3);color:var(--e1)}
.step.done-step .step-num{background:var(--sage);color:#fff}
.step-body{flex:1}
.step-prod{font-size:.86rem;font-weight:500;color:var(--txt);line-height:1.3}
.step-note{font-size:.72rem;color:var(--txt-m);margin-top:2px;line-height:1.4}
.step-actions{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:5px}
.new-badge{background:var(--new-l);color:var(--new);border-radius:50px;padding:2px 9px;font-size:.62rem;font-weight:700;letter-spacing:.03em}
.mark-new-btn{background:none;border:1px dashed var(--border);border-radius:50px;padding:2px 9px;font-size:.62rem;color:var(--txt-l);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.mark-new-btn:hover{border-color:var(--new);color:var(--new)}
.mark-new-btn.on{background:var(--new-l);border-color:var(--new);color:var(--new)}
.oil-btn{background:#f2ead8;border:none;border-radius:50px;padding:4px 11px;font-size:.68rem;color:#9a7a3a;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s}
.oil-btn:hover{background:#c9a96e;color:#fff}
.step-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:transparent;flex-shrink:0;transition:all .2s;margin-top:1px}
.step.done-step .step-chk{background:var(--sage);border-color:var(--sage);color:#fff}

/* WAIT ROW */
.wait-row{display:flex;align-items:center;gap:8px;padding:4px 12px 3px 12px;margin-bottom:3px}
.wait-line{width:2px;height:20px;border-radius:2px;flex-shrink:0;margin-right:3px}
.morn-body .wait-line{background:var(--m3)}
.eve-body .wait-line{background:var(--e3)}
.wait-lbl{font-size:.7rem;color:var(--txt-l);flex:1}
.timer-btn{border:none;border-radius:50px;padding:5px 12px;font-size:.65rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;display:flex;align-items:center;gap:3px;transition:all .2s;white-space:nowrap}
.morn-body .timer-btn{background:var(--m3);color:var(--m1)}
.morn-body .timer-btn:hover{background:var(--m1);color:#fff}
.eve-body .timer-btn{background:var(--e3);color:var(--e1)}
.eve-body .timer-btn:hover{background:var(--e1);color:#fff}
.timer-btn.running{animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* TIMER OVERLAY */
.timer-ovr{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:#fff;
  padding:16px 20px 24px;box-shadow:0 -6px 40px rgba(46,40,56,.2);display:none;direction:rtl;
  border-radius:var(--r) var(--r) 0 0}
.timer-ovr.vis{display:block}
.timer-ovr.morn-timer{border-top:4px solid var(--m1)}
.timer-ovr.eve-timer{border-top:4px solid var(--e1)}
.timer-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.timer-msg{font-family:'Playfair Display',serif;font-size:1rem;color:var(--txt);line-height:1.35}
.timer-msg.wait-msg{color:var(--m1)}
.timer-msg.immed-msg{color:var(--e1)}
.timer-skin{margin-top:4px;font-size:.75rem;font-weight:600;padding:4px 10px;border-radius:50px;display:inline-block}
.timer-skin.wet{background:var(--e3);color:var(--e1)}
.timer-skin.dry{background:var(--m3);color:var(--m1)}
.timer-close{background:none;border:1.5px solid var(--border);border-radius:50px;padding:5px 13px;
  font-size:.73rem;color:var(--txt-l);cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.timer-close:hover{border-color:var(--m1);color:var(--m1)}
.timer-ding{font-size:.82rem;min-height:22px;margin-bottom:8px;font-weight:600;
  padding:5px 12px;border-radius:50px;display:inline-block;transition:all .3s}
.timer-ding.ok{background:var(--sage-l);color:var(--sage)}
.timer-ding.best{background:var(--e3);color:var(--e1)}
.timer-ding.urgent{background:#ffebeb;color:#c0392b}
.timer-ding.warn5{background:#fff3cd;color:var(--new)}
.timer-bars{display:flex;gap:14px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.tbar{display:flex;flex-direction:column;align-items:center;gap:4px}
.tcirc{width:70px;height:70px;position:relative}
.tcirc svg{width:70px;height:70px;transform:rotate(-90deg)}
.tc-bg{fill:none;stroke-width:4}
.tc-fill{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.ttime{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:.76rem;font-weight:700;color:var(--txt)}
.tbar.reached .ttime{color:var(--sage)}
.tbar.urgent-bar .ttime{color:#c0392b}
.tbar-lbl{font-size:.6rem;color:var(--txt-l)}
.morn-timer .tc-bg{stroke:var(--m3)}
.morn-timer .c-n{stroke:var(--m2)}
.morn-timer .c-o{stroke:var(--m1)}
.morn-timer .c-x{stroke:#4a2d7a}
.eve-timer .tc-bg{stroke:var(--e3)}
.eve-timer .c-n{stroke:var(--e2)}
.eve-timer .c-o{stroke:var(--e1)}
.eve-timer .c-x{stroke:#1e5c5c}

/* OIL POPUP */
.popup-mask{position:fixed;inset:0;z-index:999;background:rgba(46,40,56,.35);display:none;align-items:center;justify-content:center;padding:20px}
.popup-mask.vis{display:flex}
.popup-box{background:#fff;border-radius:var(--r);padding:26px;max-width:440px;width:100%;box-shadow:0 8px 40px rgba(46,40,56,.22);direction:rtl;max-height:90vh;overflow-y:auto;border-top:3px solid #c9a96e}
.pop-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--txt);margin-bottom:2px}
.pop-sub{font-size:.72rem;color:var(--txt-l);margin-bottom:16px}
.oil-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:10px}
.oil-row:last-of-type{border-bottom:none}
.oil-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.oil-name{flex:1;font-size:.82rem;color:var(--txt)}
.oil-amt{font-size:.8rem;font-weight:700;color:#9a7a3a;min-width:68px}
.oil-pct{font-size:.7rem;color:var(--txt-l);min-width:28px}
.oil-why{font-size:.67rem;color:var(--txt-m);width:108px;line-height:1.3}
.pop-close{margin-top:16px;width:100%;padding:10px;background:var(--m1);border:none;border-radius:var(--r-s);color:#fff;font-family:'DM Sans',sans-serif;font-size:.83rem;cursor:pointer}

/* COMING */
.sec-title{font-family:'Playfair Display',serif;font-size:.93rem;color:var(--txt-m);margin-bottom:11px}
.coming-list{display:flex;flex-direction:column;gap:7px;margin-bottom:22px}
.coming-item{background:#fff;border-radius:var(--r-s);padding:11px 15px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(46,40,56,.04);cursor:pointer;transition:all .15s}
.coming-item:hover{transform:translateX(-2px);box-shadow:var(--shadow)}
.coming-item.today-ci{border:2px solid var(--m1)}
.cday{min-width:48px;text-align:center;flex-shrink:0}
.cday-name{font-size:.65rem;color:var(--txt-l);text-transform:uppercase;letter-spacing:.04em}
.cday-num{font-size:.88rem;font-weight:700;color:var(--txt)}
.cinfo{flex:1;min-width:0}
.cphase{font-size:.76rem;color:var(--txt-m)}
.ctags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.ctag{border-radius:50px;padding:2px 8px;font-size:.62rem;font-weight:600}
.ctag.ret{background:var(--m3);color:var(--m1)}
.ctag.med{background:var(--e3);color:var(--e1)}
.ctag.ac{background:#f2ead8;color:#9a7a3a}
.ctag.new-wk{background:var(--new-l);color:var(--new)}
.ctag.today{background:var(--m3);color:var(--m1)}
.carr{color:var(--txt-l);font-size:.68rem;flex-shrink:0}

/* MAINTENANCE BANNER */
.maint-banner{background:linear-gradient(135deg,var(--m3) 0%,var(--e3) 100%);border-radius:var(--r);padding:18px 22px;margin-bottom:16px;box-shadow:var(--shadow)}
.maint-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--txt);margin-bottom:10px}
.maint-opts{display:flex;gap:10px;flex-wrap:wrap}
.maint-opt{flex:1;min-width:200px;background:#fff;border-radius:var(--r-s);padding:14px 16px;cursor:pointer;border:2.5px solid transparent;transition:all .2s;box-shadow:0 2px 8px rgba(46,40,56,.06)}
.maint-opt:hover{border-color:var(--m2);transform:translateY(-1px)}
.maint-opt.sel{border-color:var(--m1);background:var(--m4)}
.maint-opt-title{font-weight:600;font-size:.88rem;color:var(--txt);margin-bottom:3px}
.maint-opt-sub{font-size:.72rem;color:var(--txt-m);line-height:1.4}
.maint-opt-badge{display:inline-block;margin-top:6px;background:var(--m3);color:var(--m1);border-radius:50px;padding:2px 10px;font-size:.65rem;font-weight:600}
.maint-opt.sel .maint-opt-badge{background:var(--m1);color:#fff}
.maint-week-badge{display:inline-flex;align-items:center;gap:5px;background:#fff;border-radius:50px;padding:5px 12px;font-size:.75rem;font-weight:500;color:var(--m1);box-shadow:0 2px 6px rgba(46,40,56,.08);margin-bottom:10px}

/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--txt);color:#fff;border-radius:50px;padding:9px 22px;font-size:.78rem;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* NOTIF BANNER */
.notif-banner{background:linear-gradient(135deg,var(--m3),var(--e3));border-radius:var(--r);
  padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.notif-banner-txt{flex:1;font-size:.8rem;color:var(--txt-m);line-height:1.4}
.notif-banner-txt strong{color:var(--m1);display:block;margin-bottom:2px}
.notif-allow{background:var(--m1);border:none;border-radius:50px;padding:8px 16px;
  color:#fff;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;white-space:nowrap}
.notif-allow:hover{background:#6a4d96}
.notif-dismiss{background:none;border:none;color:var(--txt-l);font-size:1rem;cursor:pointer;padding:4px;flex-shrink:0}

@media(max-width:580px){
  .week-grid{gap:4px}
  .day-cell{padding:7px 3px;min-height:78px}
  .dcell-name{font-size:.55rem}
  .dcell-type{font-size:.52rem}
  .hdr-title{font-size:1.5rem}
  .setup{flex-direction:column;align-items:flex-start}
  .timer-ovr{min-width:calc(100vw - 32px);bottom:0;border-radius:var(--r) var(--r) 0 0;padding:14px 16px}
  .tcirc{width:60px;height:60px}
  .tcirc svg{width:60px;height:60px}
}

    <div class="hdr-line"></div>

// ─── STATE ───
let S={view:'week',sw:1,selDay:null,dm:{},de:{},ds:{},mn:{},startDate:null,maint:null};

function lsLoad(){
  try{const d=JSON.parse(localStorage.getItem('g26')||'{}');
  if(d.sd){// Parse stored date safely (handle both 'YYYY-MM-DD' and old ISO strings)
    const sdStr=d.sd.substring(0,10); // take only 'YYYY-MM-DD' part
    const[y,m,dy]=sdStr.split('-').map(Number);
    S.startDate=new Date(y,m-1,dy);}
  S.dm=d.dm||{};S.de=d.de||{};S.ds=d.ds||{};S.mn=d.mn||{};S.maint=d.maint||null;}catch(e){}
}
function lsSave(){
  try{localStorage.setItem('g26',JSON.stringify({sd:S.startDate?(()=>{const y=S.startDate.getFullYear(),mo=String(S.startDate.getMonth()+1).padStart(2,'0'),dy=String(S.startDate.getDate()).padStart(2,'0');return `${y}-${mo}-${dy}`;})():null,dm:S.dm,de:S.de,ds:S.ds,mn:S.mn,maint:S.maint}));}catch(e){}
}
function resetAll(){
  if(!confirm('לאפס את כל ההתקדמות?'))return;
  S.dm={};S.de={};S.ds={};S.mn={};lsSave();render();showToast('ההתקדמות אופסה 🌸');
}

// ─── DATE ───
function nextSun(){const d=new Date();const dy=d.getDay();if(dy!==0)d.setDate(d.getDate()+(7-dy));return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function dateFor(wk,di){if(!S.startDate)return null;const d=new Date(S.startDate);d.setDate(d.getDate()+(wk-1)*7+di);return d;}
function daysDiff(a,b){
  // DST-safe: compare by calendar date, not milliseconds
  const utcA=Date.UTC(a.getFullYear(),a.getMonth(),a.getDate());
  const utcB=Date.UTC(b.getFullYear(),b.getMonth(),b.getDate());
  return Math.round((utcB-utcA)/864e5);
}
function curPos(){
  if(!S.startDate)return null;
  const t=new Date();
  const diff=daysDiff(S.startDate,t);
  if(diff<0)return null;
  if(diff<84)return{w:Math.floor(diff/7)+1,d:diff%7};
  // Beyond week 12 – maintenance mode
  if(S.maint)return{w:'maint',d:diff%7};
  return null;
}

// ─── DATA ───
function getW(wk){return WK[wk-1];}
function stepsM(wk,di){return getW(wk).m[di]||[];}
function stepsE(wk,di){return getW(wk).e[di]||[];}
function dayTypeM(wk,di){return getW(wk).mt[di]||'';}
function dayTypeE(wk,di){return getW(wk).et[di]||'';}
// Maintenance: use week 10 or 11 data
function maintWk(){return 'maint';}
function stepsM_maint(di){return MAINT.m[di]||[];}
function stepsE_maint(di){return MAINT.e[di]||[];}
function dayTypeMx(wk,di){return wk==='maint'?MAINT.mt[di]:dayTypeM(wk,di);}
function dayTypeEx(wk,di){return wk==='maint'?MAINT.et[di]:dayTypeE(wk,di);}
function dayDurX(wk,di){return wk==='maint'?(MAINT.md&&MAINT.md[di]||''):dayDur(wk,di);}
function isNewProd(wk,prod){const list=NP[String(wk)];return list?list.includes(prod):false;}
function getPhase(wk){return PHASES.find(p=>p.w.includes(wk))||PHASES[0];}
function dayDur(wk,di){return getW(wk).md?.[di]||'';}
function dayHasNew(wk,di){
  return stepsM(wk,di).some(s=>isNewProd(wk,s.p))||stepsE(wk,di).some(s=>isNewProd(wk,s.p));
}

// ─── PROGRESS ───
function progTotal(){
  const d=Object.keys(S.dm).length+Object.keys(S.de).length;
  return{pct:Math.round(d/168*100),done:d,total:168};
}
function progWeek(wk){
  let d=0;for(let i=0;i<7;i++){if(S.dm[`w${wk}d${i}`])d++;if(S.de[`w${wk}d${i}`])d++;}
  return Math.round(d/14*100);
}
function progDay(wk,di){
  const sm=stepsM(wk,di),se=stepsE(wk,di),total=sm.length+se.length;
  if(!total)return 0;
  let done=0;
  const k=`w${wk}d${di}`;
  sm.forEach((_,i)=>{if(S.ds[`${k}_m_${i}`])done++;});
  se.forEach((_,i)=>{if(S.ds[`${k}_e_${i}`])done++;});
  return Math.round(done/total*100);
}

  if(v==='day'&&!S.selDay){const p=curPos();S.selDay=p?{w:p.w,d:p.d}:{w:1,d:0};}
  render();
}

function calcSessPct(wk,di,sess){
  const steps=sess==='m'?stepsM(wk,di):stepsE(wk,di);
  if(!steps.length)return 0;
  const k=`w${wk}d${di}`;
  const done=steps.filter((_,i)=>S.ds[`${k}_${sess}_${i}`]).length;
  return Math.round(done/steps.length*100);
}

function buildSession(wk,di,sess,type,sessAllDone){
  const isMorn=sess==='m';
  const steps=isMorn?stepsM(wk,di):stepsE(wk,di);
  const k=`w${wk}d${di}`;
  const doneCount=steps.filter((_,i)=>S.ds[`${k}_${sess}_${i}`]).length;
  const pct=steps.length?Math.round(doneCount/steps.length*100):0;
  const sessId=`s_${wk}_${di}_${sess}`;
  const bodyClass=isMorn?'morn-body':'eve-body';
  const hdrClass=isMorn?'morn-hdr':'eve-hdr';

  let stepsH='';
  steps.forEach((step,i)=>{
    if(!step||step.p==='---')return;
    const sk=`${k}_${sess}_${i}`;
    const isDone=!!S.ds[sk];
    const isNew=isNewProd(wk,step.p)||!!S.mn[sk];
    const isManNew=!!S.mn[sk];
    let cls='step';
    if(isDone)cls+=' done-step';
    if(isNew&&!isDone)cls+=' new-prod';

    stepsH+=`<div class="${cls}" id="st_${sk}">
      <div class="step-top">
        <div class="step-num">${i+1}</div>
        <div class="step-body">
          <div class="step-prod">${step.p}</div>
          ${step.n&&step.n!=='---'?`<div class="step-note">${step.n}</div>`:''}
          <div class="step-actions">
            ${isNewProd(wk,step.p)?'<span class="new-badge">✦ חדש</span>':''}
            <button class="mark-new-btn${isManNew?' on':''}" onclick="toggleManNew('${sk}')">
              ${isManNew?'✦ מסומן':'+ סמן חדש'}</button>
            ${(step.oil||step.p.includes('תערובת שמנים'))?`<button class="oil-btn" onclick="openOil()">🌿 נוסחת שמנים</button>`:''}
          </div>
        </div>
        <div class="step-chk" onclick="toggleStep('${sk}','${sess}',${wk},${di})">${isDone?'✓':''}</div>
      </div>
    </div>`;

    // Wait + Timer button
    if(step.w&&i<steps.length-1){
      const wt=step.w;
      const mn=(wt.n||0)*60, op=(wt.o||0)*60, mx=(wt.x||0)*60;
      const hasTimer=mn>0||op>0||mx>0;
      const timerSess=isMorn?'m':'e';
      const btnId=`tb_${sk}`;
      stepsH+=`<div class="wait-row">
        <div class="wait-line"></div>
        <span class="wait-lbl">⏳ ${wt.l}</span>
        ${hasTimer?`<button class="timer-btn" id="${btnId}" onclick="startTimer(${mn},${op},${mx},'${step.p.replace(/'/g,"\\'").substring(0,35)}','${timerSess}','${sk}')">⏱ טיימר</button>`:''}
      </div>`;
    }
  });

  return `<div class="sess">

    <div class="sess-body ${bodyClass} open" id="${sessId}">${stepsH}</div>
  </div>`;
}


function markSess(e,k,sess,count){
  e.stopPropagation();
  const all=Array.from({length:count},(_,i)=>S.ds[`${k}_${sess}_${i}`]).every(Boolean);
  for(let i=0;i<count;i++){if(all)delete S.ds[`${k}_${sess}_${i}`];else S.ds[`${k}_${sess}_${i}`]=true;}
  if(all){if(sess==='m')delete S.dm[k];else delete S.de[k];}
  else{if(sess==='m')S.dm[k]=true;else S.de[k]=true;}
  stopTimer(false);
  lsSave();render();
}
function toggleStep(sk,sess,wk,di){
  const wasChecked=!!S.ds[sk];
  if(wasChecked) delete S.ds[sk]; else S.ds[sk]=true;
  const k=`w${wk}d${di}`;
  const steps=wk==='maint'?(sess==='m'?stepsM_maint(di):stepsE_maint(di)):(sess==='m'?stepsM(wk,di):stepsE(wk,di));
  const idx=parseInt(sk.split('_').pop());

  // Gather timer info BEFORE render (DOM will be rebuilt)
  let timerArgs=null;
  if(!wasChecked){
    // Just CHECKED: stop any running timer (user moved on to next step)
    stopTimer(false);
    // Then check if THIS step has a wait → start timer after render
    const step=steps[idx];
    if(step && step.w && idx<steps.length-1){
      const wt=step.w;
      const mn=(wt.n!=null?wt.n:0)*60;
      const op=(wt.o!=null?wt.o:0)*60;
      const mx=(wt.x!=null?wt.x:0)*60;
      const nextStep=steps[idx+1];
      timerArgs={mn,op,mx,sess,nextNote:(nextStep&&nextStep.n)||''};
    }
  } else {
    // Just UNCHECKED: stop timer
    stopTimer(false);
  }

  const all=steps.every((_,i)=>S.ds[`${k}_${sess}_${i}`]);
  if(all){if(sess==='m')S.dm[k]=true;else S.de[k]=true;}
  else{if(sess==='m')delete S.dm[k];else delete S.de[k];}
  lsSave();
  render();
  // Start timer AFTER render so overlay DOM is stable
  if(timerArgs) startAutoTimer(timerArgs.mn,timerArgs.op,timerArgs.mx,timerArgs.sess,timerArgs.nextNote);
}
function toggleManNew(sk){
  if(S.mn[sk])delete S.mn[sk];else S.mn[sk]=true;
  lsSave();render();
}
function navDay(dir){
  let{w:wk,d:di}=S.selDay;di+=dir;
  if(di<0){di=6;wk=wk==='maint'?'maint':wk-1;}
  if(di>6){di=0;wk=wk==='maint'?'maint':wk+1;}
  if(wk!=='maint'&&(wk<1||(wk>12&&!S.maint)))return;
  if(wk!=='maint'&&wk>12&&S.maint)wk='maint';
  S.selDay={w:wk,d:di};render();
}

// ─── TIMER ───
// TD: {t, mn, op, mx, sess, nextSkinState, hit:Set}
let TI=null, TD=null;

function extractSkinState(note){
  if(!note) return null;
  if(/עור לח|עור נקי ומעט לח/.test(note)) return 'wet';
  if(/עור יבש/.test(note)) return 'dry';
  return null;
}

function startAutoTimer(mn,op,mx,sess,nextNote){
  stopTimer(false);
  const skin=extractSkinState(nextNote||'');
  TD={t:Date.now(),mn,op,mx,sess,skin,hit:new Set(),warned5:false};
  const ovr=document.getElementById('tOvr');
  ovr.className='timer-ovr vis '+(sess==='m'?'morn-timer':'eve-timer');

  // Main message
  const isImmed=(mn===0||mn===null);
  const msgEl=document.getElementById('tMsg');
  if(isImmed){
    msgEl.className='timer-msg immed-msg';
    msgEl.textContent='אין המתנה, אפשר להמשיך מיד ✓';
  } else {
    msgEl.className='timer-msg wait-msg';
    msgEl.textContent='יש להמתין!';
  }

  // Skin state alert for NEXT step
  const skinEl=document.getElementById('tSkin');
  if(skin==='wet'){skinEl.className='timer-skin wet';skinEl.textContent='💧 השלב הבא: על עור לח!';}
  else if(skin==='dry'){skinEl.className='timer-skin dry';skinEl.textContent='🌬️ השלב הבא: על עור יבש'}
  else{skinEl.className='timer-skin';skinEl.textContent='';}

  document.getElementById('tDing').textContent='';
  document.getElementById('tDing').className='timer-ding';

  // Build circles
  const C=(2*Math.PI*28).toFixed(2);
  let bh='';
  const hasN=!isImmed && mn>0;
  const hasO=op>0 && op!==mn;
  const hasX=mx>0 && mx!==op && mx!==mn;
  const hasXimmed=isImmed && mx>0;
  if(hasN)            bh+=mkCirc('n','c-n','מינימום',C);
  if(hasO)            bh+=mkCirc('o','c-o','אופטימום',C);
  if(hasX||hasXimmed) bh+=mkCirc('x','c-x','מקסימום',C);
  if(!bh) bh='<div style="color:var(--txt-l);font-size:.82rem;padding:10px 0">ממשיכים מיד 🌸</div>';
  document.getElementById('tBars').innerHTML=bh;

  document.getElementById('tOvr').scrollIntoView({behavior:'smooth',block:'nearest'});
  TI=setInterval(tick,1000);tick();
}

function stopTimer(doRender=true){
  if(TI){clearInterval(TI);TI=null;}
  TD=null;
  document.getElementById('tOvr').classList.remove('vis');
}

function mkCirc(id,col,lbl,C){
  return `<div class="tbar" id="tb_${id}">
    <div class="tcirc"><svg viewBox="0 0 64 64">
      <circle class="tc-bg" cx="32" cy="32" r="28"/>
      <circle class="tc-fill ${col}" id="tf_${id}" cx="32" cy="32" r="28"
        stroke-dasharray="${C}" stroke-dashoffset="${C}"/>
    </svg><div class="ttime" id="tt_${id}">0:00</div></div>
    <div class="tbar-lbl">${lbl}</div>
  </div>`;
}

function tick(){
  if(!TD) return;
  const el=Math.floor((Date.now()-TD.t)/1000);
  const C=2*Math.PI*28;
  const ding=document.getElementById('tDing');
  const isImmed=(TD.mn===0||TD.mn===null);

  function updCirc(id,tgt){
    if(!tgt||tgt<=0) return;
    const f=document.getElementById('tf_'+id);
    const t=document.getElementById('tt_'+id);
    const bar=document.getElementById('tb_'+id);
    if(!f) return;
    const prog=Math.min(el/tgt,1);
    f.style.strokeDashoffset=(C*(1-prog)).toFixed(2);
    const rem=Math.max(tgt-el,0);
    t.textContent=Math.floor(rem/60)+':'+(rem%60).toString().padStart(2,'0');
    // milestone reached
    if(el>=tgt && !TD.hit.has(id)){
      TD.hit.add(id);
      if(id==='n'){
        ding.className='timer-ding ok';
        ding.textContent='✅ מותר כבר להתקדם לשלב הבא!';
        beep(523);
        sendNotif('✅ מותר להתקדם!','הגיע הזמן המינימלי – אפשר לעבור לשלב הבא','min');
      } else if(id==='o'){
        ding.className='timer-ding best';
        ding.textContent='🌿 עכשיו זה הזמן הטוב ביותר להתקדם!';
        beep(659);
        if(bar) bar.classList.add('reached');
        sendNotif('🌿 הזמן הטוב ביותר!','עכשיו האופטימום – כדאי לעבור לשלב הבא','opt');
      } else if(id==='x'){
        ding.className='timer-ding urgent';
        ding.textContent='🚨 הזמן נגמר, חייבת להתקדם עכשיו!';
        beep(784); setTimeout(()=>beep(784),400);
        if(bar) bar.classList.add('urgent-bar');
        sendNotif('🚨 הזמן נגמר!','חייבת להתקדם עכשיו – המקסימום הסתיים','max');
      }
    }
    // 5-min warning before max (only for max circle)
    if(id==='x' && !TD.warned5 && tgt>300 && (tgt-el)===300){
      TD.warned5=true;
      // Don't overwrite a more urgent message — use a separate tone
      beep(440);
      sendNotif('⏰ 5 דקות!','המקסימום מסתיים בעוד 5 דקות – תתכוני','warn5');
      if(!TD.hit.has('x')){
        ding.className='timer-ding warn5';
        ding.textContent='⏰ הזמן נגמר עוד 5 דקות!';
      }
    }
  }

  // Run circles based on what exists
  const hasN=!isImmed && TD.mn>0;
  const hasO=TD.op>0 && TD.op!==TD.mn;
  const hasX=(TD.mx>0 && TD.mx!==TD.op && TD.mx!==TD.mn)||(isImmed && TD.mx>0);
  if(hasN) updCirc('n', TD.mn);
  if(hasO) updCirc('o', TD.op);
  if(hasX) updCirc('x', TD.mx);
}

function beep(freq){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.frequency.value=freq;o.type='sine';
  g.gain.setValueAtTime(0.3,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.0);
  o.start();o.stop(ctx.currentTime+1.0);}catch(e){}
}

// ─── TOAST ───
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// ─── DATE INPUT ───
function bindDate(){
  const inp=document.getElementById('sd');if(!inp)return;
  if(S.startDate){
    const y=S.startDate.getFullYear(),mo=String(S.startDate.getMonth()+1).padStart(2,'0'),dy=String(S.startDate.getDate()).padStart(2,'0');
    inp.value=`${y}-${mo}-${dy}`;
  }
  inp.onchange=function(){if(this.value){const[y,m,d]=this.value.split('-').map(Number);S.startDate=new Date(y,m-1,d);}else{S.startDate=null;}S.sw=1;lsSave();render();};

}

// ─── SERVICE WORKER + NOTIFICATIONS ───
function initSW(){
  if('serviceWorker' in navigator){
    // Clean up any stale/broken service workers first
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>{
        if(r.active&&r.active.scriptURL&&!r.active.scriptURL.includes(location.hostname)){
          r.unregister();
        }
      });
    });
    navigator.serviceWorker.register('sw.js')
      .then(reg=>{window._swReg=reg;})
      .catch(e=>console.log('SW error',e));
  }
}

function initNotifBanner(){
  if(!('Notification' in window))return;
  const dismissed=localStorage.getItem('notifDismissed');
  if(dismissed)return;
  if(Notification.permission==='granted'){
    // Already granted – register SW silently
    initSW();return;
  }
  if(Notification.permission!=='denied'){
    document.getElementById('notifBanner').style.display='flex';
  }
}

function requestNotif(){
  Notification.requestPermission().then(perm=>{
    document.getElementById('notifBanner').style.display='none';
    if(perm==='granted'){initSW();showToast('התראות פעילות 🔔');}
  });
}
function dismissNotif(){
  document.getElementById('notifBanner').style.display='none';
  localStorage.setItem('notifDismissed','1');
}

// Send notification via SW (works when screen is off)
function sendNotif(title, body, tag){
  if(Notification.permission!=='granted')return;
  if(window._swReg && window._swReg.active){
    window._swReg.active.postMessage({type:'NOTIFY',title,body,tag});
  } else {
    // Fallback: direct notification (works when app is in foreground/bg)
    new Notification(title,{body,icon:'icon-192.png',tag,renotify:true,
      vibrate:[200,100,200],requireInteraction:false});
  }
}

// ─── DEBUG ───
function debugDate(){
  const raw=localStorage.getItem('g26');
  const parsed=JSON.parse(raw||'{}');
  const t=new Date();
  const s=S.startDate;
  const t0=new Date(t);
  const diff=s?daysDiff(s,t0):null;
  alert(
    'localStorage sd: '+parsed.sd+'\n'+
    'S.startDate: '+(s?s.getFullYear()+'-'+(s.getMonth()+1)+'-'+s.getDate():'null')+'\n'+
    'היום (new Date()): '+t.toLocaleDateString('he-IL')+'\n'+
    't midnight: '+t0.toISOString()+'\n'+
    's midnight: '+(s0?s0.toISOString():'null')+'\n'+
    'diff days: '+diff+'\n'+
    'week: '+(diff!=null?Math.floor(diff/7)+1:'?')+' day: '+(diff!=null?diff%7:'?')
  );
}

lsLoad();
if(!S.startDate)S.startDate=nextSun();
initNotifBanner();
initSW();

render();
